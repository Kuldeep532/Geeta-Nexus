name: gitanexus
description: "Gita Nexus - A comprehensive spiritual and AI-powered mobile application by Satvik Technology."
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase removed — add real credentials to re-enable
  flutter_local_notifications: ^18.0.1

  # --- State Management ---
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  get_it: ^8.0.2

  # --- UI & Styling ---
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  flutter_spinkit: ^5.2.1
  flex_color_scheme: ^8.0.1
  animations: ^2.0.1
  flutter_markdown: ^0.7.5
  dynamic_color: ^1.7.0

  # --- Data & Utilities ---
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.19.0
  dartz: ^0.10.1
  csv: ^6.0.0
  string_stats: ^0.1.0
  string_similarity: ^2.2.0

  # --- Storage ---
  shared_preferences: ^2.3.5
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2

  # --- Networking & AI ---
  http: ^1.3.0
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.3
  google_generative_ai: ^0.4.7
  google_sign_in: ^6.2.2

  # --- Hardware & Media ---
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  device_info_plus: ^11.2.2
  package_info_plus: ^8.2.1
  image_picker: ^1.1.2
  audioplayers: ^6.1.2
  just_audio: ^0.9.44
  just_audio_background: ^0.0.1-beta.17
  audio_video_progress_bar: ^2.0.3
  speech_to_text: ^7.3.1
  flutter_tts: ^4.2.3
  wakelock_plus: ^1.2.8
  vibration: ^2.0.0
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

# --- LAUNCHER ICON ENGINE CONFIG ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.png"
  adaptive_icon_background: "#001a4d"
  adaptive_icon_foreground: "assets/images/Logo.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Cinzel
      fonts:
        - asset: google_fonts/Cinzel-Regular.ttf
    - family: Lora
      fonts:
        - asset: google_fonts/Lora-Regular.ttf

  assets:
    - assets/data/Bhagwad_Gita.csv
    - assets/data/ai_knowledge_base.json
    - assets/data/training_data.csv
    - assets/images/Logo.png
