name: gitanexus
description: "Gita Nexus - A comprehensive spiritual and AI-powered mobile application by Satvik Technology."
publish_to: 'none'
version: 3.5.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase Core, Firestore & Messaging ---
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0          # ZAROORI: AppState mein iska use ho raha hai
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.2

  # --- State Management ---
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  get_it: ^7.7.0

  # --- UI & Styling ---
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.1
  flex_color_scheme: ^7.3.1
  animations: ^2.0.1
  flutter_markdown: ^0.7.3
  dynamic_color: ^1.7.0

  # --- Data & Utilities ---
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0
  dartz: ^0.10.1
  csv: ^6.0.0
  string_stats: ^0.1.0

  # --- Storage ---
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3+3
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2

  # --- Networking & AI ---
  http: ^1.2.2
  dio: ^5.7.0
  connectivity_plus: ^6.0.5
  google_generative_ai: ^0.4.0
  google_sign_in: ^7.2.0

  # --- Hardware & Media ---
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^10.1.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.1.0
  image_picker: ^1.1.2
  audioplayers: ^5.2.1
  just_audio: ^0.9.46
  audio_video_progress_bar: ^2.0.3
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  wakelock_plus: ^1.2.8
  vibration: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Fonts section (Humein Cinzel aur Lora use karna hai as per code)
  fonts:
    - family: Cinzel
      fonts:
        - asset: google_fonts/Cinzel-Regular.ttf
    - family: Lora
      fonts:
        - asset: google_fonts/Lora-Regular.ttf

  assets:
    - assets/data/Bhagwad_Gita.csv
    - assets/data/ai_knowledge_base.json
    - assets/data/training_data.csv
    - assets/images/  # Agar aapne icons ya images rakhi hain
