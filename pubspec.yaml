name: gitanexus
description: "Gita Nexus - A comprehensive spiritual and AI-powered mobile application by Satvik Technology."
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase Core, Firestore & Messaging ---
  firebase_core: ^4.8.0
  cloud_firestore: ^6.4.0
  firebase_messaging: ^16.2.1
  flutter_local_notifications: ^20.1.0

  # --- State Management ---
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  get_it: ^9.2.1

  # --- UI & Styling ---
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.1
  flex_color_scheme: ^8.2.0
  animations: ^2.0.1
  flutter_markdown: ^0.7.3
  dynamic_color: ^1.7.0

  # --- Data & Utilities ---
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0
  dartz: ^0.10.1
  csv: ^6.0.0
  string_stats: ^0.1.0

  # --- Storage ---
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3+3
  path_provider: ^2.1.3
  flutter_secure_storage: ^10.2.0

  # --- Networking & AI ---
  http: ^1.2.2
  dio: ^5.7.0
  connectivity_plus: ^7.1.1
  google_generative_ai: ^0.4.0
  google_sign_in: ^7.2.0

  # --- Hardware & Media ---
  permission_handler: ^12.0.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.2
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  image_picker: ^1.1.2
  audioplayers: ^6.6.0
  just_audio: ^0.10.5
  audio_video_progress_bar: ^2.0.3
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  wakelock_plus: ^1.2.8
  vibration: ^3.1.8
  flutter_cache_manager: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.13.1 # ZAROORI: Launcher icon automatic banane ke liye

# --- LAUNCHER ICON ENGINE CONFIG ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.png" # Aapka naya divine logo
  adaptive_icon_background: "#001a4d" # Bhagwan Krishna ka divine Shyam Blue background
  adaptive_icon_foreground: "assets/images/Logo.png"

flutter:
  uses-material-design: true
  
  fonts:
    - family: Cinzel
      fonts:
        - asset: google_fonts/Cinzel-Regular.ttf
    - family: Lora
      fonts:
        - asset: google_fonts/Lora-Regular.ttf

  assets:
    - assets/data/Bhagwad_Gita.csv
    - assets/data/ai_knowledge_base.json
    - assets/data/training_data.csv
    - assets/images/Logo.png # ZAROORI: Explicit path in-app usage ke liye
