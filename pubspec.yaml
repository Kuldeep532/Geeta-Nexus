name: gitanexus
description: "Gita Nexus - A comprehensive spiritual and AI-powered mobile application by Satvik Technology."
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.3.0 <4.0.0' # SDK ko thoda upgrade kiya hai taaki naye packages compatible rahein

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase Core, Firestore, Auth & Messaging (Fully Synced Stable Versions) ---
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.1          # <-- Missing package yahan add kar diya hai
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.2.1

  # --- State Management ---
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  get_it: ^7.6.0

  # --- UI & Styling ---
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.1
  flex_color_scheme: ^7.3.1
  animations: ^2.0.1
  flutter_markdown: ^0.7.3
  dynamic_color: ^1.6.9

  # --- Data & Utilities ---
  intl: ^0.19.0
  uuid: ^4.3.3
  collection: ^1.18.0
  dartz: ^0.10.1
  csv: ^6.0.0
  string_stats: ^0.1.0

  # --- Storage ---
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2

  # --- Networking & AI ---
  http: ^1.2.1
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  google_generative_ai: ^0.4.3
  google_sign_in: ^6.2.1

  # --- Hardware & Media (Stable Audio & Speech Ecosystem) ---
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^7.2.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  image_picker: ^1.1.2
  audioplayers: ^6.0.0
  just_audio: ^0.9.38
  just_audio_background: ^0.0.1-beta.17  # <-- Fixed: Changed from non-existent ^0.0.5 to a valid pub.dev release
  audio_video_progress_bar: ^2.0.3
  speech_to_text: ^6.6.1
  flutter_tts: ^4.1.0
  wakelock_plus: ^1.2.8
  vibration: ^1.8.4
  flutter_cache_manager: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9        # Version conflict theek kiya gaya hai
  flutter_launcher_icons: ^0.13.1

# --- LAUNCHER ICON ENGINE CONFIG ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.png"
  adaptive_icon_background: "#001a4d" # Divine Shyam Blue
  adaptive_icon_foreground: "assets/images/Logo.png"

flutter:
  uses-material-design: true
  
  fonts:
    - family: Cinzel
      fonts:
        - asset: google_fonts/Cinzel-Regular.ttf
    - family: Lora
      fonts:
        - asset: google_fonts/Lora-Regular.ttf

  assets:
    - assets/data/Bhagwad_Gita.csv
    - assets/data/ai_knowledge_base.json
    - assets/data/training_data.csv
    - assets/images/Logo.png
