<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gita Nexus — Your AI Spiritual Companion. Bhagavad Gita, Vedic scriptures, meditation, chants and more.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gita Nexus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gita Nexus</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="https://js.puter.com/v2/"></script>
  <script>
    window.puterTTS = async function(text) {
      try {
        const audio = await puter.ai.txt2speech(text);
        audio.play();
      } catch (e) {
        console.warn('Puter TTS failed:', e);
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
