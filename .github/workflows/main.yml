name: Geeta AI - Manual Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Decode Release Keystore
        run: |
          mkdir -p android-signing
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "KEYSTORE_BASE64 is missing"
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-signing/my-release-key.jks

      - name: Create key.properties
        run: |
          if [ ! -f android-signing/my-release-key.jks ]; then
            echo "Keystore file missing"
            exit 1
          fi
          cat > android/key.properties <<EOF
storeFile=android-signing/my-release-key.jks
storePassword=${{ secrets.KEYSTORE_PASSWORD }}
keyAlias=${{ secrets.KEY_ALIAS }}
keyPassword=${{ secrets.KEY_PASSWORD }}
EOF

      - name: Create Google Services JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Set Gemini API Key
        run: |
          echo "GEMINI_AI_API_KEY=${{ secrets.GEMINI_AI_API_KEY }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          chmod +x android/gradlew
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: manual-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
