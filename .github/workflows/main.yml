name: Geeta AI - Manual Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Base64 string se google-services.json file generate karna
      - name: Create Google Services JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      # Gemini API Key ko environment variable mein set karna
      - name: Set Gemini API Key
        run: |
          echo "GEMINI_AI_API_KEY=${{ secrets.GEMINI_AI_API_KEY }}" >> $GITHUB_ENV

      # Verify the release keystore is actually present on the runner so the
      # build fails fast with a clear message instead of a confusing
      # "keystore not found" error deep inside Gradle.
      - name: Verify release keystore
        run: |
          set -e
          KEY_PROPS="android/key.properties"
          if [ ! -f "$KEY_PROPS" ]; then
            echo "::error::android/key.properties is missing. Commit it (without secrets) or generate it in CI from GitHub secrets."
            exit 1
          fi
          echo "key.properties contents (passwords masked):"
          sed -E 's/(Password=).*/\1***/' "$KEY_PROPS"

          STORE_FILE="$(grep -E '^storeFile=' "$KEY_PROPS" | cut -d= -f2-)"
          echo "Looking for keystore declared as: $STORE_FILE"
          for candidate in \
            "android/app/$STORE_FILE" \
            "android/$STORE_FILE" \
            "$STORE_FILE" \
            "$GITHUB_WORKSPACE/$STORE_FILE"; do
            if [ -f "$candidate" ]; then
              echo "Found keystore at: $candidate"
              FOUND=1
              break
            fi
          done
          if [ -z "${FOUND:-}" ]; then
            echo "::error::Release keystore '$STORE_FILE' not found in repo. Commit the .jks file or decode it in CI from a GitHub secret."
            echo "Tip: add a 'Decode keystore' step that does: echo \"\${{ secrets.KEYSTORE_BASE64 }}\" | base64 -d > $STORE_FILE"
            exit 1
          fi

      - name: Build APK
        run: |
          chmod +x android/gradlew
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: manual-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
